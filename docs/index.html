<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta content="noindex, nofollow" name="robots">
    <meta content="noindex, nofollow" name="googlebot">
    <title>Armagomen Donate</title>
    <link href="style.css" rel="stylesheet">
    <link href="img/favicon.svg" rel="icon" type="image/svg+xml">
</head>
<body>

<h1 class="ukraine-gradient">Support Battle Observer Project</h1>

<div class="toast" id="toast"></div>


<!-- Monobank -->
<div class="donate" data-url="https://send.monobank.ua/jar/5BZHrPrJwr">
    <div class="donation__icons"><img alt="GLASS" src="img/glass.png"></div>
    <div class="mono_icon"><img alt="Monobank" class="mono" src="img/mono2.svg"></div>
    <div class="donation__info">

        <span>Поповнити "Банку"</span>
        <span class="currency">(UAH)</span>
    </div>
</div>


<!-- VISA USD -->
<div class="donate card" data-value="4874100084799728">
    <div class="donation__icons"><img alt="Visa" src="img/visa.svg"></div>
    <div class="mono_icon"><img alt="Monobank" class="mono" src="img/mono2.svg"></div>
    <div class="donation__info">
        <span class="card-number">4874 1000 8479 9728</span>
        <span class="currency">(USD)</span>
        <span class="donation__copy"></span>
    </div>
</div>

<!-- VISA EUR -->
<div class="donate card" data-value="4874100092188559">
    <div class="donation__icons"><img alt="Visa" src="img/visa.svg"></div>
    <div class="mono_icon"><img alt="Monobank" class="mono" src="img/mono2.svg"></div>
    <div class="donation__info">
        <span class="card-number">4874 1000 9218 8559</span>
        <span class="currency">(EUR)</span>
        <span class="donation__copy"></span>
    </div>
</div>

<!-- блок для реквізитів SEPA-->
<div class="donate">
    <div class="donation__icons">
        <img alt="SEPA" src="img/sepa.svg">
    </div>
    <div class="donation__info extra">
        <div class="card" data-value="GB63CLJU0097188565027">
            IBAN:<br><span class="card-number">GB63CLJU0097188565027</span>
        </div>
        <div class="card" data-value="CLJUGB21">
            BIC:<br><span class="card-number">CLJUGB21</span>
        </div>
        <div class="card" data-value="STARCHYKOV VOLODYMYR">
            Receiver:<br><span class="card-number">STARCHYKOV VOLODYMYR</span>
        </div>
        <span class="donation__copy"></span>
    </div>
</div>

<!-- Patreon -->
<div class="donate" data-url="https://patreon.com/armagomen">
    <div class="donation__icons">
        <img alt="Patreon" src="img/patreon.svg">
    </div>
    <div class="donation__info">
        <span>Patreon</span>
    </div>
</div>


<footer>
    <p class="no-select">Thank you for your support. (Armagomen)</p>
</footer>

<script src="skript.js"></script>
</body>
</html>
